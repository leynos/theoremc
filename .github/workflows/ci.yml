name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Lint
        run: make lint
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          use-cargo-nextest: "true"
          output-path: lcov.info
          format: lcov
          with-ratchet: "true"
      # The `mode: check` step is deliberately not wired in yet:
      # CodeScene project 76770 has no coverage-gates configuration, so
      # `cs-coverage check` is expected to fail every run with "HTTP
      # call succeeded, but the received project-config isn't valid.
      # Lacks the gates configuration." — a CodeScene-side per-project
      # setting, not a CI defect (ddlint#287, chutoro#156 hit the
      # byte-identical error). Add the check step in a fast-follow PR
      # once coverage-main.yml has uploaded to main at least once and
      # the gate is confirmed to resolve, or once CodeScene confirms
      # project 76770's coverage gate is enabled.
